services:
  minio:
    image: minio/minio:latest
    container_name: sc-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: admin12345
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    container_name: sc-redpanda
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 1G
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://localhost:9092
    ports:
      - "9092:9092"
      - "9644:9644"

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: sc-clickhouse
    ports:
      - "8123:8123"
      - "9002:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse

  grafana:
    image: grafana/grafana:latest
    container_name: sc-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana

  prefect:
    image: prefecthq/prefect:2-latest
    container_name: sc-prefect
    ports:
      - "4200:4200"
    command: prefect server start --host 0.0.0.0

  cube:
    image: cubejs/cube:latest
    container_name: sc-cube
    ports:
      - "4000:4000"
    environment:
      CUBEJS_DEV_MODE: "true"
      CUBEJS_DB_TYPE: clickhouse
      CUBEJS_DB_HOST: clickhouse
      CUBEJS_DB_PORT: 8123
      CUBEJS_DB_NAME: default
      CUBEJS_API_SECRET: smart_campus_secret
    volumes:
      - ./semantic_layer/cube:/cube/conf
    depends_on:
      - clickhouse

volumes:
  minio_data:
  clickhouse_data:
  grafana_data:
